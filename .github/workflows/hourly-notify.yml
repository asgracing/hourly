name: Hourly Notify

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print message without sending notifications"
        required: false
        default: "true"
      force_send:
        description: "Send a test notification without waiting for the notification window"
        required: false
        default: "false"
  schedule:
    - cron: "30 15 * * *"
      timezone: "Europe/Moscow"
    - cron: "0 17 * * *"
      timezone: "Europe/Moscow"

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HOURLY_ANNOUNCEMENT_URL: ${{ vars.HOURLY_ANNOUNCEMENT_URL }}
          HOURLY_SCHEDULE_URL: ${{ vars.HOURLY_SCHEDULE_URL }}
          HOURLY_VOTES_API_BASE: ${{ vars.HOURLY_VOTES_API_BASE }}
          HOURLY_NOTIFY_WINDOW_MINUTES: ${{ vars.HOURLY_NOTIFY_WINDOW_MINUTES }}
          HOURLY_NOTIFY_FINAL_WINDOW_MINUTES: ${{ vars.HOURLY_NOTIFY_FINAL_WINDOW_MINUTES }}
          HOURLY_NOTIFY_FINAL_WINDOW_BEFORE_MINUTES: ${{ vars.HOURLY_NOTIFY_FINAL_WINDOW_BEFORE_MINUTES }}
          HOURLY_NOTIFY_FINAL_WINDOW_AFTER_MINUTES: ${{ vars.HOURLY_NOTIFY_FINAL_WINDOW_AFTER_MINUTES }}
          HOURLY_NOTIFY_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && 'true' || 'false' }}
          HOURLY_NOTIFY_FORCE_SEND: ${{ github.event.inputs.force_send == 'true' && 'true' || 'false' }}
        run: python scripts/hourly_notify.py

      - name: Commit updated notify state
        if: github.event_name != 'workflow_dispatch' || (github.event.inputs.dry_run != 'true' && github.event.inputs.force_send != 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/hourly_notify_state.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update hourly notify state"
          git push
