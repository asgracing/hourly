name: One-time Combat-like Endurance Notify Test

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/notify-smoke-test.yml

permissions:
  contents: read

jobs:
  notify-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send one combat-like Endurance test notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HOURLY_ANNOUNCEMENT_URL: ${{ vars.HOURLY_ANNOUNCEMENT_URL }}
          HOURLY_SCHEDULE_URL: ${{ vars.HOURLY_SCHEDULE_URL }}
          HOURLY_VOTES_API_BASE: ${{ vars.HOURLY_VOTES_API_BASE }}
          HOURLY_NOTIFY_DRY_RUN: "false"
          HOURLY_NOTIFY_FORCE_SEND: "true"
          HOURLY_NOTIFY_NOW: "2026-07-19T12:00:00+03:00"
          TELEGRAM_PIN_MESSAGE: "false"
          TELEGRAM_UNPIN_PREVIOUS_MESSAGE: "false"
        run: python scripts/hourly_notify.py
